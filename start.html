<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>開始記録</title>
<style>
body { font-family: sans-serif; padding: 15px; background: #f5f5f5; }
h1 { background: #007bff; color: white; padding: 8px; border-radius: 5px; }
.block { background: white; padding: 12px; margin-bottom: 18px; border-radius: 8px; }
label { display: block; margin-top: 10px; font-weight: bold; }
input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 5px; }
button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; }
</style>
</head>
<body>

<h1>開始記録</h1>

<div class="block">
    <label>日付</label>
    <input type="date" id="date">

    <label>開始時刻</label>
    <input type="time" id="startTime">

    <label>運転者名</label>
    <select id="driver">
        <option value="">選択してください</option>
        <option>岡山和徳</option>
        <option>土田一樹</option>
        <option>中野昌広</option>
        <option>高橋徹</option>
        <option>中山怜</option>
        <option>目敏彦</option>
        <option>江澤現之</option>
        <option>藤本晴樹</option>
        <option>中野桂子</option>
        <option>田平友美</option>
    </select>

    <label>車両番号</label>
    <select id="carNumber">
        <option value="">選択してください</option>
        <option>11-00(セレナ)</option>
        <option>11-55(セレナ)</option>
        <option>84-62</option>
        <option>52-78</option>
        <option>71-71</option>
        <option>27-01</option>
        <option>03-54</option>
        <option>02-12(軽トラ)</option>
        <option>16-96(軽トラ)</option>
        <option>27-70(2tDT)</option>
        <option>10-95(4t)</option>
        <option>79-55</option>
    </select>

    <label>睡眠時間</label>
    <input type="text" id="sleep">

    <label>開始Alc</label>
    <select id="startAlc">
        <option>OK</option>
        <option>NG</option>
    </select>

    <label>薬の服用</label>
    <select id="medicine">
        <option>無</option>
        <option>有</option>
    </select>

    <label>薬による眠気</label>
    <select id="sleepy">
        <option>無</option>
        <option>有</option>
    </select>

    <label>開始体調</label>
    <select id="startCond">
        <option>良</option>
        <option>普通</option>
        <option>悪い</option>
    </select>

    <label>開始車両状態</label>
    <select id="startCar">
        <option>正常</option>
        <option>異常</option>
    </select>
</div>

<button id="sendBtn">開始を送信</button>

<script>
document.getElementById("sendBtn").addEventListener("click", function () {
    const data = {
        mode: "start",
        date: document.getElementById("date").value,
        startTime: document.getElementById("startTime").value,
        driver: document.getElementById("driver").value,
        carNumber: document.getElementById("carNumber").value,
        sleep: document.getElementById("sleep").value,
        startAlc: document.getElementById("startAlc").value,
        medicine: document.getElementById("medicine").value,
        sleepy: document.getElementById("sleepy").value,
        startCond: document.getElementById("startCond").value,
        startCar: document.getElementById("startCar").value
    };

    fetch("https://script.google.com/macros/s/AKfycbyXh1ZJbE1Smx56tBxKOiP1ie6b6vNTRfUsb-WeZJfGFVX-q_85xyE8AWqtT9Rkl7_L9w/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        localStorage.setItem("row", res.row);
        alert("開始を記録しました！\n行番号: " + res.row);
        window.location.href = "end.html";
    })
    .catch(() => alert("送信エラー。GASのURLやアクセス権を確認してください。"));
});
</script>

</body>
</html>
