<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>開始記録</title>
<style>
    body { font-family: sans-serif; padding: 15px; background: #f5f5f5; }
    h2 { background: #007bff; color: white; padding: 8px; border-radius: 5px; }
    .block { background: white; padding: 12px; margin-bottom: 18px; border-radius: 8px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, select {
        width: 100%; padding: 8px; margin-top: 4px;
        border: 1px solid #ccc; border-radius: 5px;
    }
    button {
        width: 100%; padding: 12px; background: #28a745; color: white;
        border: none; border-radius: 8px; font-size: 18px;
    }
</style>
</head>
<body>

<h1>開始記録</h1>

<div class="block">
    <label>日付</label>
    <input type="date" id="date">

    <label>開始時刻</label>
    <input type="time" id="startTime">

    <label>運転者名</label>
    <input type="text" id="driver">

    <label>車両番号</label>
    <input type="text" id="carNumber">

    <label>睡眠時間</label>
    <input type="text" id="sleep">

    <label>開始Alc</label>
    <select id="startAlc">
        <option value="OK">OK</option>
        <option value="NG">NG</option>
    </select>

    <label>薬の服用</label>
    <select id="medicine">
        <option value="無">無</option>
        <option value="有">有</option>
    </select>

    <label>薬による眠気</label>
    <select id="sleepy">
        <option value="無">無</option>
        <option value="有">有</option>
    </select>

    <label>開始体調</label>
    <select id="startCond">
        <option value="良">良</option>
        <option value="普通">普通</option>
        <option value="悪い">悪い</option>
    </select>

    <label>開始車両状態</label>
    <select id="startCar">
        <option value="正常">正常</option>
        <option value="異常">異常</option>
    </select>
</div>

<button id="sendBtn">開始を送信</button>

<script>
document.getElementById("sendBtn").addEventListener("click", function () {

    const data = {
        mode: "start",
        date: document.getElementById("date").value,
        startTime: document.getElementById("startTime").value,
        driver: document.getElementById("driver").value,
        carNumber: document.getElementById("carNumber").value,
        sleep: document.getElementById("sleep").value,
        startAlc: document.getElementById("startAlc").value,
        medicine: document.getElementById("medicine").value,
        sleepy: document.getElementById("sleepy").value,
        startCond: document.getElementById("startCond").value,
        startCar: document.getElementById("startCar").value
    };

    fetch("https://script.google.com/macros/s/AKfycbxFYdp0lP94rhr84FcUfAe0Mi1JT_l9IYsSssDC63cA9RAzLF2_HcSxFeh_Bs9iQg1dXQ/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        localStorage.setItem("row", res.row);
        alert("開始を記録しました！\n行番号: " + res.row);
    })
    .catch(() => alert("送信エラー"));
});
</script>

</body>
</html>
